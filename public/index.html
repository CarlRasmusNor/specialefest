<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Specialefest 🏁</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080808;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(90deg, #0d0d1a 0%, #141428 100%);
      border-bottom: 2px solid #f5c518;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .title {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 0.25em;
      color: #f5c518;
      text-transform: uppercase;
      text-shadow: 0 0 24px rgba(245,197,24,0.6);
    }

    .subtitle {
      font-size: 0.75rem;
      color: #666;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    #clock {
      font-size: 2rem;
      font-weight: 300;
      color: #f5c518;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.05em;
    }

    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* TRACK AREA */
    .track-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 6px 0;
      position: relative;
    }

    .lane {
      flex: 1;
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      position: relative;
    }

    .rank-col {
      width: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 900;
      flex-shrink: 0;
      background: #0a0a0a;
      border-right: 1px solid #1a1a1a;
    }

    .track {
      flex: 1;
      position: relative;
      background:
        repeating-linear-gradient(90deg, transparent 0, transparent 58px, rgba(255,255,255,0.025) 58px, rgba(255,255,255,0.025) 60px),
        linear-gradient(180deg, #161616 0%, #111 100%);
      overflow: hidden;
    }

    /* center dashed line */
    .track::before {
      content: '';
      position: absolute;
      left: 0; right: 20px;
      top: 50%;
      border-top: 2px dashed rgba(255,255,255,0.06);
      pointer-events: none;
    }

    /* finish line */
    .track::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 20px;
      background: repeating-conic-gradient(#e0e0e0 0% 25%, #111 0% 50%) 0 0 / 10px 10px;
      z-index: 5;
    }

    .car {
      position: absolute;
      left: 2%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: left 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 10;
      cursor: default;
    }

    .car-points {
      background: rgba(0,0,0,0.75);
      color: #f5c518;
      font-size: 0.65rem;
      font-weight: 800;
      padding: 1px 6px;
      border-radius: 4px;
      margin-bottom: 3px;
      white-space: nowrap;
      letter-spacing: 0.05em;
    }

    .car-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 3px solid currentColor;
      overflow: hidden;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1rem;
      box-shadow: 0 0 14px currentColor;
      position: relative;
    }

    .car-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .car-avatar .initials {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 900;
    }

    .car-name {
      font-size: 0.6rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 3px;
      white-space: nowrap;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    }

    .car-stars {
      font-size: 0.65rem;
      color: #f5c518;
      letter-spacing: 1px;
      text-shadow: 0 0 6px rgba(245,197,24,0.9);
      margin-top: 2px;
      min-height: 10px;
      white-space: nowrap;
    }

    .trail {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 3px;
      width: 0%;
      transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      background: linear-gradient(90deg, transparent 0%, currentColor 100%);
      opacity: 0.4;
      pointer-events: none;
      z-index: 4;
      border-radius: 0 2px 2px 0;
    }

    .trail.leader {
      height: 4px;
      opacity: 1;
      background: linear-gradient(90deg, transparent 0%, #f5c518 100%);
      box-shadow: 0 0 10px #f5c518, 0 0 22px rgba(245,197,24,0.35);
    }

    /* DRINK LOG */
    .drink-log {
      width: 210px;
      flex-shrink: 0;
      background: #0d0d0d;
      border-left: 1px solid #1e1e1e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .drink-log-header {
      padding: 8px 12px;
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #f5c518;
      border-bottom: 1px solid #1e1e1e;
      background: #0a0a0a;
      flex-shrink: 0;
    }

    .log-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
    }

    .log-list::-webkit-scrollbar { width: 4px; }
    .log-list::-webkit-scrollbar-track { background: #0d0d0d; }
    .log-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .log-item {
      padding: 5px 8px;
      border-radius: 6px;
      margin-bottom: 3px;
      background: rgba(255,255,255,0.04);
      font-size: 0.88rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .log-item .log-name { font-weight: 700; flex: 1; }
    .log-item .log-time { color: #ccc; font-size: 0.65rem; }

    .drink-totals {
      padding: 8px;
      border-top: 1px solid #1e1e1e;
      background: #0a0a0a;
      flex-shrink: 0;
    }

    .dt-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3px 2px;
      font-size: 0.85rem;
    }

    .dt-row .dt-name { color: #888; }
    .dt-row .dt-count { color: #f5c518; font-weight: 700; }

    /* CELEBRATION OVERLAY */
    #celebration {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #celebration.show { display: flex; }

    #cel-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .cel-card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .cel-cat {
      font-size: 1.1rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #f5c518;
      text-shadow: 0 0 24px rgba(245,197,24,0.9);
      animation: celPop 1.8s ease-in-out infinite;
    }

    .cel-ring {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 6px solid #f5c518;
      overflow: hidden;
      animation: celGlow 1.4s ease-in-out infinite alternate;
    }

    .cel-ring img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cel-name {
      font-size: 4.5rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      animation: celPop 1.8s ease-in-out infinite;
    }

    .cel-score {
      font-size: 1.6rem;
      color: #fff;
      font-weight: 600;
      opacity: 0.85;
      letter-spacing: 0.08em;
    }

    @keyframes celPop {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes celGlow {
      from { box-shadow: 0 0 0 4px #111, 0 0 0 8px #f5c518, 0 0 50px #f5c518, 0 0 100px rgba(245,197,24,0.4); }
      to   { box-shadow: 0 0 0 4px #111, 0 0 0 8px #f5c518, 0 0 90px #f5c518, 0 0 180px rgba(245,197,24,0.7); }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="title">🏁 Specialefest</div>
    <div class="subtitle">Point-tavle</div>
  </div>
  <div id="clock"></div>
</header>

<div id="celebration">
  <canvas id="cel-canvas"></canvas>
  <div class="cel-card">
    <div class="cel-cat" id="cel-cat"></div>
    <div class="cel-ring"><img id="cel-img" src="" alt=""></div>
    <div class="cel-name" id="cel-name"></div>
    <div class="cel-score" id="cel-score"></div>
  </div>
</div>

<main>
  <div class="track-area" id="track-area"></div>

  <div class="drink-log">
    <div class="drink-log-header">🍺 Druk-log</div>
    <div class="log-list" id="log-list">
      <div style="color:#333; text-align:center; padding:20px; font-size:0.8rem;">Ingen endnu</div>
    </div>
    <div class="drink-totals" id="drink-totals"></div>
  </div>
</main>

<script>
  const COLORS = {
    Victor:  { hex: '#e74c3c' },
    Sune:    { hex: '#3498db' },
    Reber:   { hex: '#2ecc71' },
    Asger:   { hex: '#e67e22' },
    Emilie:  { hex: '#c678dd' },
    Carl:    { hex: '#1abc9c' },
    Johan:   { hex: '#f39c12' },
    Mads:    { hex: '#e91e63' },
  };

  const RANK_LABELS = ['🥇', '🥈', '🥉'];

  function initials(name) { return name.slice(0, 2).toUpperCase(); }


  function formatTime(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString('da-DK', { hour: '2-digit', minute: '2-digit' });
  }

  // Clock
  function tick() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('da-DK', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  setInterval(tick, 1000);
  tick();

  // Build lane DOM once
  function buildLanes() {
    const area = document.getElementById('track-area');
    Object.entries(COLORS).forEach(([name, c]) => {
      const lane = document.createElement('div');
      lane.className = 'lane';
      lane.id = 'lane-' + name;
      lane.innerHTML = `
        <div class="rank-col" id="rank-${name}">1</div>
        <div class="track">
          <div class="trail" id="trail-${name}" style="color: ${c.hex}"></div>
          <div class="car" id="car-${name}" style="color: ${c.hex}">
            <div class="car-points" id="pts-${name}">0 pt</div>
            <div class="car-avatar" style="border-color:${c.hex}; box-shadow:0 0 14px ${c.hex}88">
              <img src="/photos/${name.toLowerCase()}.jpg"
                   onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
              <span class="initials" style="color:${c.hex}">${initials(name)}</span>
            </div>
            <div class="car-name" style="color:${c.hex}">${name}</div>
            <div class="car-stars" id="stars-${name}"></div>
          </div>
        </div>
      `;
      area.appendChild(lane);
    });
  }

  function render(state) {
    const sorted = [...state.participants].sort((a, b) => b.points - a.points);
    const maxPts = Math.max(...sorted.map(p => p.points), 10);

    sorted.forEach((p, rank) => {
      const lane = document.getElementById('lane-' + p.name);
      lane.style.order = rank;

      document.getElementById('rank-' + p.name).textContent = RANK_LABELS[rank] || (rank + 1);
      document.getElementById('pts-' + p.name).textContent = p.points + ' pt';

      const pct = 2 + (p.points / maxPts) * 83;
      document.getElementById('car-' + p.name).style.left = pct + '%';

      document.getElementById('stars-' + p.name).textContent = '★'.repeat(p.wins || 0);

      const podiumColors = ['#f5c518', '#c0c0c0', '#cd7f32'];
      const trailColor = rank < 3 ? podiumColors[rank] : COLORS[p.name].hex;
      const trail = document.getElementById('trail-' + p.name);
      trail.style.width = p.points > 0 ? pct + '%' : '0%';
      trail.style.background = `linear-gradient(90deg, transparent 0%, ${trailColor} 100%)`;
      trail.style.opacity = rank < 3 && p.points > 0 ? '1' : '0.4';
      trail.style.height = rank === 0 ? '4px' : '3px';
      trail.style.boxShadow = rank === 0 ? '0 0 10px #f5c518, 0 0 22px rgba(245,197,24,0.35)'
                             : rank === 1 ? '0 0 8px rgba(192,192,192,0.4)'
                             : rank === 2 ? '0 0 8px rgba(205,127,50,0.4)'
                             : 'none';
    });

    // Log
    const drinkLogs = state.log.filter(l => l.type === 'drink').slice(0, 25);
    const logList = document.getElementById('log-list');
    if (drinkLogs.length === 0) {
      logList.innerHTML = '<div style="color:#333; text-align:center; padding:20px; font-size:0.8rem;">Ingen endnu</div>';
    } else {
      const DRINK_EMOJI = { øl: '🍺', vin: '🍷', drink: '🍹', drik: '🍹' };
      logList.innerHTML = drinkLogs.map(l => {
        const c = COLORS[l.name]?.hex || '#fff';
        const emoji = DRINK_EMOJI[l.drinkType] || '🍺';
        const units = l.units > 1 ? ` ×${l.units}` : '';
        return `<div class="log-item">
          <span>${emoji}</span>
          <span class="log-name" style="color:${c}">${l.name}${units}</span>
          <span class="log-time">${formatTime(l.time)}</span>
        </div>`;
      }).join('');
    }

    renderCelebration(state.celebration || null);

    // Totals
    const totals = document.getElementById('drink-totals');
    const byDrinks = [...state.participants].sort((a, b) => b.drinks - a.drinks);
    totals.innerHTML = byDrinks.map(p => `
      <div class="dt-row">
        <span class="dt-name">${p.name}</span>
        <span class="dt-count">${p.drinks} 🍺</span>
      </div>
    `).join('');
  }

  async function poll() {
    try {
      const res = await fetch('/api/state');
      const state = await res.json();
      render(state);
    } catch (e) { /* silent */ }
  }

  // ── Confetti ──────────────────────────────────────────────
  const CONFETTI_COLORS = ['#f5c518','#ffffff','#e74c3c','#3498db','#2ecc71','#c678dd','#f39c12','#e91e63'];
  let confettiParts = [], celRaf = null;

  function startConfetti() {
    const cv = document.getElementById('cel-canvas');
    cv.width = window.innerWidth;
    cv.height = window.innerHeight;
    const ctx = cv.getContext('2d');
    confettiParts = Array.from({ length: 180 }, () => ({
      x: Math.random() * cv.width,
      y: Math.random() * -cv.height,
      vx: (Math.random() - 0.5) * 3,
      vy: Math.random() * 3 + 1.5,
      rot: Math.random() * 360,
      rv: (Math.random() - 0.5) * 7,
      w: Math.random() * 10 + 6,
      h: Math.random() * 6 + 3,
      color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
    }));
    (function loop() {
      ctx.clearRect(0, 0, cv.width, cv.height);
      confettiParts.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.rot += p.rv;
        if (p.y > cv.height) { p.y = -20; p.x = Math.random() * cv.width; }
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      });
      celRaf = requestAnimationFrame(loop);
    })();
  }

  function stopConfetti() {
    if (!celRaf) return;
    cancelAnimationFrame(celRaf);
    celRaf = null;
    const cv = document.getElementById('cel-canvas');
    cv.getContext('2d').clearRect(0, 0, cv.width, cv.height);
  }

  const CEL_LABELS = { points: '🏆 POINT-VINDER', drinks: '🍺 DRUK-MESTER', wins: '⭐ CHALLENGE-MESTER' };
  const CEL_SUFFIX = { points: ' point', drinks: ' genstande', wins: ' sejre' };
  let lastCelKey = null;

  function renderCelebration(cel) {
    const el = document.getElementById('celebration');
    if (!cel) {
      el.classList.remove('show');
      stopConfetti();
      lastCelKey = null;
      return;
    }
    const key = cel.category + cel.winner;
    if (key === lastCelKey) return;
    lastCelKey = key;

    const hex = COLORS[cel.winner]?.hex || '#f5c518';
    document.getElementById('cel-cat').textContent = CEL_LABELS[cel.category] || '';
    document.getElementById('cel-img').src = `/photos/${cel.winner.toLowerCase()}.jpg`;
    document.getElementById('cel-name').textContent = cel.winner;
    document.getElementById('cel-name').style.color = hex;
    document.getElementById('cel-name').style.textShadow = `0 0 40px ${hex}, 0 0 80px ${hex}66`;
    document.getElementById('cel-score').textContent = cel.score + (CEL_SUFFIX[cel.category] || '');
    el.classList.add('show');
    stopConfetti();
    startConfetti();
  }

  // ── Boot ──────────────────────────────────────────────────
  buildLanes();
  poll();
  setInterval(poll, 3000);
</script>
</body>
</html>
